<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 هوش مصنوعی سازنده کد HTML</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0b1120, #1a2744);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(18, 30, 51, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.05);
        }
        h1 {
            color: #e0edff;
            font-weight: 400;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #2a3f62;
            padding-bottom: 15px;
        }
        h1 small {
            font-size: 14px;
            background: #2f4a7a;
            padding: 4px 18px;
            border-radius: 30px;
            color: #b6ceff;
        }
        .sub {
            color: #9cb2da;
            margin: 10px 0 25px 0;
            padding-right: 16px;
            border-right: 3px solid #4a7ad8;
        }
        .chat-box {
            background: #0e1629;
            border-radius: 24px;
            padding: 20px;
            min-height: 200px;
            max-height: 350px;
            overflow-y: auto;
            border: 1px solid #253a5a;
            margin-bottom: 20px;
            box-shadow: inset 0 6px 12px rgba(0,0,0,0.4);
        }
        .chat-box .msg {
            margin-bottom: 18px;
            padding: 12px 18px;
            border-radius: 20px;
            max-width: 90%;
            word-wrap: break-word;
            line-height: 1.7;
            font-size: 15px;
        }
        .chat-box .user {
            background: #1f3560;
            color: #d6e6ff;
            align-self: flex-end;
            margin-right: auto;
            border-bottom-left-radius: 6px;
        }
        .chat-box .ai {
            background: #1e2d47;
            color: #d0deff;
            border-bottom-right-radius: 6px;
            border-right: 3px solid #4f8aff;
        }
        .chat-box .ai code {
            display: block;
            background: #0b1424;
            padding: 14px;
            border-radius: 16px;
            margin-top: 10px;
            color: #b7d0ff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            white-space: pre-wrap;
            word-break: break-word;
            border: 1px solid #2d4670;
            direction: ltr;
            text-align: left;
        }
        .input-area {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .input-area input {
            flex: 1;
            padding: 16px 22px;
            border-radius: 60px;
            border: 1px solid #2d4a74;
            background: #0d1a2d;
            color: #eaf1ff;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
            min-width: 200px;
        }
        .input-area input::placeholder {
            color: #6f89b3;
        }
        .input-area input:focus {
            border-color: #6b9aff;
            box-shadow: 0 0 0 3px rgba(70, 130, 255, 0.2);
        }
        .input-area button {
            padding: 16px 32px;
            border: none;
            background: #3b6bc9;
            color: white;
            font-weight: 600;
            border-radius: 60px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 12px rgba(40, 100, 255, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .input-area button:hover {
            background: #4f7ee0;
            transform: scale(1.02);
            box-shadow: 0 8px 18px rgba(40, 100, 255, 0.4);
        }
        .input-area button:active {
            transform: scale(0.97);
        }
        .footer {
            margin-top: 20px;
            color: #5a78a8;
            font-size: 13px;
            text-align: center;
            border-top: 1px solid #1f3150;
            padding-top: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>
        🤖 هوش مصنوعی سازنده کد
        <small>HTML</small>
    </h1>
    <div class="sub">
        📝 درخواست خود را بنویسید، من یک کد HTML برایتان می‌سازم.
    </div>

    <div class="chat-box" id="chatBox">
        <div class="msg ai">
            👋 سلام! من یک هوش مصنوعی هستم که کد HTML می‌نویسم.
            <br>
            مثلاً بنویس: <strong>«یک کارت پستال ساده با عکس و متن بساز»</strong>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="مثال: یک فرم تماس ساده بساز ...">
        <button id="sendBtn">✨ بفرست</button>
    </div>
    <div class="footer">
        ⚡ با هر درخواست، کد HTML جدیدی تولید می‌شود.
    </div>
</div>

<script>
    (function() {
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // تابع برای اضافه کردن پیام به چت
        function addMessage(type, content, code = null) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${type}`;

            if (type === 'user') {
                msgDiv.textContent = content;
            } else {
                // پیام هوش مصنوعی
                const textSpan = document.createElement('span');
                textSpan.textContent = content;
                msgDiv.appendChild(textSpan);

                if (code) {
                    const codeBlock = document.createElement('code');
                    codeBlock.textContent = code;
                    msgDiv.appendChild(codeBlock);
                }
            }

            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // تابع تولید کد HTML بر اساس درخواست
        function generateHTML(request) {
            // پاکسازی و نرمال‌سازی درخواست
            const cleanRequest = request.trim().toLowerCase();

            // ---------- هوش مصنوعی ساده (pattern matching) ----------
            let title = 'صفحه ساخته شده توسط هوش مصنوعی';
            let bodyContent = `<p style="font-size:20px; color:#2c3e50;">🧠 این کد بر اساس درخواست شما ساخته شده است.</p>`;
            let extraStyle = '';

            // تشخیص کلمه‌های کلیدی
            if (cleanRequest.includes('کارت') || cleanRequest.includes('پستال') || cleanRequest.includes('کارت پستال')) {
                title = 'کارت پستال هوشمند';
                bodyContent = `
                    <div style="max-width:400px; margin:60px auto; background:#f8f9fc; border-radius:30px; padding:30px; box-shadow:0 12px 40px rgba(0,0,0,0.1); text-align:center; direction:rtl; font-family:tahoma;">
                        <div style="font-size:60px; margin-bottom:10px;">🌄</div>
                        <h2 style="color:#1e3c72;">سلام از کوهستان</h2>
                        <p style="color:#3a5a7a; line-height:1.8;">این یک کارت پستال ساده است که توسط هوش مصنوعی ساخته شده.</p>
                        <div style="background:#dce6f2; border-radius:60px; padding:8px 20px; display:inline-block; margin-top:12px;">✨ مخصوص شما</div>
                    </div>
                `;
            }
            else if (cleanRequest.includes('فرم') || cleanRequest.includes('تماس') || cleanRequest.includes('contact')) {
                title = 'فرم تماس ساده';
                bodyContent = `
                    <div style="max-width:450px; margin:50px auto; background:white; border-radius:28px; padding:35px; box-shadow:0 8px 30px rgba(0,0,0,0.08); direction:rtl; font-family:tahoma;">
                        <h2 style="text-align:center; color:#1f3a6b;">📬 فرم تماس</h2>
                        <form style="display:flex; flex-direction:column; gap:16px; margin-top:20px;">
                            <input type="text" placeholder="نام شما" style="padding:14px; border-radius:50px; border:1px solid #ccc; font-size:16px;">
                            <input type="email" placeholder="ایمیل" style="padding:14px; border-radius:50px; border:1px solid #ccc; font-size:16px;">
                            <textarea placeholder="پیام شما ..." rows="3" style="padding:14px; border-radius:24px; border:1px solid #ccc; font-size:16px;"></textarea>
                            <button style="background:#2a5caa; color:white; padding:14px; border:none; border-radius:50px; font-size:18px; cursor:pointer;">ارسال</button>
                        </form>
                    </div>
                `;
            }
            else if (cleanRequest.includes('جدول') || cleanRequest.includes('table')) {
                title = 'جدول داده‌ها';
                bodyContent = `
                    <div style="max-width:700px; margin:50px auto; background:white; border-radius:24px; padding:25px; direction:rtl; font-family:tahoma; box-shadow:0 6px 24px rgba(0,0,0,0.05);">
                        <h3 style="color:#1e3a6b;">📊 جدول نمونه</h3>
                        <table style="width:100%; border-collapse:collapse; margin-top:16px; text-align:center;">
                            <tr style="background:#1e3a6b; color:white;"><th>نام</th><th>شهر</th><th>امتیاز</th></tr>
                            <tr><td>آرش</td><td>تهران</td><td>۹۸</td></tr>
                            <tr><td>سارا</td><td>شیراز</td><td>۹۵</td></tr>
                            <tr><td>مهدی</td><td>اصفهان</td><td>۹۲</td></tr>
                        </table>
                    </div>
                `;
            }
            else if (cleanRequest.includes('دکمه') || cleanRequest.includes('button')) {
                title = 'دکمه‌های زیبا';
                bodyContent = `
                    <div style="max-width:500px; margin:80px auto; text-align:center; direction:rtl; font-family:tahoma;">
                        <h3 style="color:#1f3a6b;">🔘 دکمه‌های تعاملی</h3>
                        <div style="display:flex; flex-wrap:wrap; gap:18px; justify-content:center; margin-top:30px;">
                            <button style="background:#2a6bb0; color:white; border:none; padding:16px 36px; border-radius:60px; font-size:18px; cursor:pointer;">کلیک کن</button>
                            <button style="background:#1f8b4c; color:white; border:none; padding:16px 36px; border-radius:60px; font-size:18px; cursor:pointer;">تایید</button>
                            <button style="background:#b13e3e; color:white; border:none; padding:16px 36px; border-radius:60px; font-size:18px; cursor:pointer;">انصراف</button>
                        </div>
                    </div>
                `;
            }
            else {
                // حالت پیش‌فرض: یک صفحه ساده با توضیح
                title = 'صفحه‌ای بر اساس درخواست شما';
                bodyContent = `
                    <div style="max-width:600px; margin:60px auto; background:#f3f7fe; border-radius:32px; padding:40px; text-align:center; direction:rtl; font-family:tahoma; box-shadow:0 6px 20px rgba(0,0,0,0.04);">
                        <h2 style="color:#1d3d6b;">🤖 کد HTML ساخته شد</h2>
                        <p style="font-size:18px; color:#2c4c7a;">درخواست شما: <strong>«${request}»</strong></p>
                        <p style="margin-top:20px; color:#3f5f8a;">این یک صفحه ساده است که توسط هوش مصنوعی تولید شده.</p>
                        <div style="background:#dbe5f5; border-radius:60px; padding:10px 20px; display:inline-block; margin-top:22px;">⚡ کد آماده استفاده</div>
                    </div>
                `;
            }

            // ساخت کد کامل HTML
            return `<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${title}</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #e9eff8;
            font-family: Tahoma, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        ${extraStyle}
    </style>
</head>
<body>
    ${bodyContent}
</body>
</html>`;
        }

        // تابع پردازش درخواست کاربر
        function handleUserRequest() {
            const text = userInput.value.trim();
            if (text === '') {
                addMessage('ai', '⚠️ لطفاً یک درخواست بنویسید. مثلاً: «یک کارت پستال بساز»');
                return;
            }

            // نمایش پیام کاربر
            addMessage('user', text);

            // تولید کد HTML
            const generatedCode = generateHTML(text);

            // نمایش پاسخ هوش مصنوعی + کد
            const responseText = `✅ کد HTML بر اساس درخواست شما ساخته شد.`;
            addMessage('ai', responseText, generatedCode);

            // پاک کردن فیلد ورودی
            userInput.value = '';
        }

        // رویداد‌ها
        sendBtn.addEventListener('click', handleUserRequest);

        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleUserRequest();
            }
        });

        // فوکوس اولیه
        userInput.focus();
    })();
</script>

</body>
</html>
